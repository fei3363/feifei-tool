<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word 批次取代工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4747;
    --success: #47ff8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px;
    width: 100%;
  }

  header {
    margin-bottom: 48px;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tag::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  h1 {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .num {
    background: var(--accent);
    color: var(--bg);
    width: 18px; height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Drop zone */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  .dropzone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .dropzone-icon {
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .dropzone-text {
    font-size: 14px;
    color: var(--muted);
  }

  .dropzone-text strong {
    color: var(--accent);
  }

  /* File list */
  .file-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-icon { font-size: 16px; }

  .file-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .file-size {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 14px;
    transition: color 0.15s;
    line-height: 1;
  }

  .file-remove:hover { color: var(--danger); }

  .file-status {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .status-pending { background: rgba(102,102,102,0.2); color: var(--muted); }
  .status-done { background: rgba(71,255,138,0.15); color: var(--success); }
  .status-error { background: rgba(255,71,71,0.15); color: var(--danger); }

  /* Replace inputs */
  .replace-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: end;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }

  .arrow-divider {
    color: var(--accent);
    font-size: 18px;
    padding-bottom: 10px;
    text-align: center;
  }

  /* Options */
  .options-row {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  .checkbox-label:hover { color: var(--text); }

  .checkbox-label input[type="checkbox"] {
    appearance: none;
    width: 14px; height: 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--surface2);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .checkbox-label input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox-label input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
  }

  /* Batch rules */
  .rules-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .rule-item {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 8px;
    align-items: center;
    animation: slideIn 0.2s ease;
  }

  .rule-arrow {
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .rule-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }

  .rule-remove:hover { color: var(--danger); }

  .add-rule-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-transform: uppercase;
  }

  .add-rule-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Action button */
  .run-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }

  .run-btn:hover:not(:disabled) {
    background: #f5ff70;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(232,255,71,0.25);
  }

  .run-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .run-btn .btn-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .run-btn:hover:not(:disabled) .btn-shimmer {
    transform: translateX(100%);
  }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active { display: block; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Log */
  .log-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.8;
    display: none;
  }

  .log-panel.visible { display: block; }
  .log-info { color: var(--muted); }
  .log-success { color: var(--success); }
  .log-error { color: var(--danger); }
  .log-highlight { color: var(--accent); }

  /* Download section */
  .download-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .download-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(71,255,138,0.06);
    border: 1px solid rgba(71,255,138,0.2);
    border-radius: 3px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
  }

  .download-name { flex: 1; color: var(--text); }
  .download-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--success);
  }

  .dl-btn {
    background: var(--success);
    color: var(--bg);
    border: none;
    padding: 5px 12px;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .dl-btn:hover { background: #6fffaa; }

  .dl-all-btn {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--success);
    color: var(--success);
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .dl-all-btn:hover {
    background: rgba(71,255,138,0.1);
  }

  .section-hidden { display: none; }

  footer {
    text-align: center;
    padding: 32px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="tag">Batch Processing Tool</div>
    <h1>Word 批次<span>取代</span>工具</h1>
    <p class="subtitle">上傳多個 .docx 檔案，一鍵取代指定文字，保留原始格式</p>
  </header>

  <!-- Step 1: Upload -->
  <div class="card">
    <div class="card-title"><span class="num">1</span> 上傳 Word 檔案</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple accept=".docx">
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-text">
        拖曳 <strong>.docx</strong> 檔案至此，或點擊選取<br>
        <span style="font-size:12px;margin-top:4px;display:block">支援多檔案同時處理</span>
      </div>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <!-- Step 2: Rules -->
  <div class="card">
    <div class="card-title"><span class="num">2</span> 設定取代規則</div>

    <div class="rules-list" id="rulesList">
      <div class="rule-item" data-id="0">
        <div class="input-group">
          <span class="input-label">原始文字</span>
          <input class="input-field rule-find" type="text" placeholder="輸入要尋找的文字...">
        </div>
        <div class="rule-arrow">→</div>
        <div class="input-group">
          <span class="input-label">取代為</span>
          <input class="input-field rule-replace" type="text" placeholder="輸入取代後的文字...">
        </div>
        <button class="rule-remove" title="移除此規則">×</button>
      </div>
    </div>

    <button class="add-rule-btn" id="addRuleBtn">＋ 新增取代規則</button>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="optCase"> 區分大小寫
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="optHeaders" checked> 包含頁首頁尾
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="optComments"> 包含批註
      </label>
    </div>
  </div>

  <!-- Step 3: Run -->
  <div class="card">
    <div class="card-title"><span class="num">3</span> 執行取代</div>

    <button class="run-btn" id="runBtn" disabled>
      <div class="btn-shimmer"></div>
      ▶ 開始批次取代
    </button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="log-panel" id="logPanel"></div>
  </div>

  <!-- Step 4: Download -->
  <div class="card section-hidden" id="downloadSection">
    <div class="card-title"><span class="num">4</span> 下載結果</div>
    <div class="download-list" id="downloadList"></div>
    <br>
    <button class="dl-all-btn" id="dlAllBtn">⬇ 全部下載</button>
  </div>

</div>

<footer>WORD BATCH REPLACE TOOL · 所有處理均在瀏覽器本地完成，檔案不會上傳至任何伺服器</footer>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const files = new Map(); // id → {file, name}
const results = []; // {name, blob, count}
let fileIdCounter = 0;
let ruleIdCounter = 1;

// ── DOM refs ───────────────────────────────────────────────────────────────
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const rulesList = document.getElementById('rulesList');
const addRuleBtn = document.getElementById('addRuleBtn');
const runBtn = document.getElementById('runBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const logPanel = document.getElementById('logPanel');
const downloadSection = document.getElementById('downloadSection');
const downloadList = document.getElementById('downloadList');
const dlAllBtn = document.getElementById('dlAllBtn');

// ── File upload ────────────────────────────────────────────────────────────
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => {
  addFiles([...fileInput.files]);
  fileInput.value = '';
});

function addFiles(newFiles) {
  newFiles.filter(f => f.name.toLowerCase().endsWith('.docx')).forEach(f => {
    const id = fileIdCounter++;
    files.set(id, { file: f, name: f.name });
    renderFileItem(id, f);
  });
  updateRunBtn();
}

function renderFileItem(id, f) {
  const el = document.createElement('div');
  el.className = 'file-item';
  el.id = `file-${id}`;
  el.innerHTML = `
    <span class="file-icon">📝</span>
    <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
    <span class="file-size">${formatSize(f.size)}</span>
    <span class="file-status status-pending" id="status-${id}">待處理</span>
    <button class="file-remove" onclick="removeFile(${id})">×</button>
  `;
  fileList.appendChild(el);
}

function removeFile(id) {
  files.delete(id);
  document.getElementById(`file-${id}`)?.remove();
  updateRunBtn();
}

// ── Rules ──────────────────────────────────────────────────────────────────
addRuleBtn.addEventListener('click', addRule);

function addRule() {
  const id = ruleIdCounter++;
  const el = document.createElement('div');
  el.className = 'rule-item';
  el.dataset.id = id;
  el.innerHTML = `
    <div class="input-group">
      <span class="input-label">原始文字</span>
      <input class="input-field rule-find" type="text" placeholder="輸入要尋找的文字...">
    </div>
    <div class="rule-arrow">→</div>
    <div class="input-group">
      <span class="input-label">取代為</span>
      <input class="input-field rule-replace" type="text" placeholder="輸入取代後的文字...">
    </div>
    <button class="rule-remove" title="移除此規則" onclick="removeRule(${id})">×</button>
  `;
  rulesList.appendChild(el);
}

function removeRule(id) {
  const el = rulesList.querySelector(`[data-id="${id}"]`);
  if (el && rulesList.children.length > 1) el.remove();
}

// remove first rule
rulesList.querySelector('.rule-remove').addEventListener('click', function() {
  if (rulesList.children.length > 1) this.closest('.rule-item').remove();
});

// ── Helpers ────────────────────────────────────────────────────────────────
function updateRunBtn() { runBtn.disabled = files.size === 0; }
function formatSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+'MB' : (b/1024).toFixed(0)+'KB'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function log(msg, type='info') {
  logPanel.classList.add('visible');
  const el = document.createElement('div');
  el.className = `log-${type}`;
  el.textContent = `${new Date().toLocaleTimeString('zh-TW')} › ${msg}`;
  logPanel.appendChild(el);
  logPanel.scrollTop = logPanel.scrollHeight;
}

function setProgress(pct) {
  progressBar.classList.add('active');
  progressFill.style.width = pct + '%';
}

function setFileStatus(id, status, text) {
  const el = document.getElementById(`status-${id}`);
  if (el) { el.className = `file-status status-${status}`; el.textContent = text; }
}

// ── Core: Replace in XML ───────────────────────────────────────────────────
function getRules() {
  return [...rulesList.querySelectorAll('.rule-item')].map(row => ({
    find: row.querySelector('.rule-find').value,
    replace: row.querySelector('.rule-replace').value
  })).filter(r => r.find.trim() !== '');
}

// Replace in XML text nodes, handling split runs
// docx splits text across multiple <w:t> elements; we need to handle that.
function replaceInXml(xmlStr, find, replace, caseSensitive) {
  let count = 0;
  const flags = caseSensitive ? 'g' : 'gi';
  const escaped = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, flags);

  // Strategy: extract full paragraph text, do replacement,
  // then put it back. But to keep formatting we only replace
  // in w:t tag contents.
  // Simpler approach: replace in the raw XML w:t content
  // This handles most practical cases
  const result = xmlStr.replace(/<w:t([^>]*)>([\s\S]*?)<\/w:t>/g, (match, attrs, text) => {
    const newText = text.replace(re, () => { count++; return replace; });
    if (newText !== text) {
      // Ensure xml:space="preserve" if needed
      if (!attrs.includes('xml:space')) {
        attrs = ' xml:space="preserve"' + attrs;
      }
      return `<w:t${attrs}>${newText}</w:t>`;
    }
    return match;
  });

  return { xml: result, count };
}

// ── Main processing ────────────────────────────────────────────────────────
runBtn.addEventListener('click', async () => {
  const rules = getRules();
  if (rules.length === 0) { log('請至少設定一條取代規則', 'error'); return; }
  if (files.size === 0) { log('請先上傳 Word 檔案', 'error'); return; }

  const caseSensitive = document.getElementById('optCase').checked;
  const includeHeaders = document.getElementById('optHeaders').checked;
  const includeComments = document.getElementById('optComments').checked;

  runBtn.disabled = true;
  results.length = 0;
  downloadList.innerHTML = '';
  downloadSection.classList.add('section-hidden');
  logPanel.innerHTML = '';
  setProgress(0);

  const fileArr = [...files.entries()];
  log(`開始處理 ${fileArr.length} 個檔案，${rules.length} 條規則`, 'highlight');

  for (let i = 0; i < fileArr.length; i++) {
    const [id, {file, name}] = fileArr[i];
    setProgress(Math.round((i / fileArr.length) * 90));

    try {
      const arrayBuffer = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(arrayBuffer);
      let totalCount = 0;

      // Determine which XML files to process
      const targets = ['word/document.xml'];
      if (includeHeaders) {
        Object.keys(zip.files).forEach(k => {
          if (k.startsWith('word/header') || k.startsWith('word/footer')) targets.push(k);
        });
      }
      if (includeComments) {
        if (zip.files['word/comments.xml']) targets.push('word/comments.xml');
      }

      for (const target of targets) {
        if (!zip.files[target]) continue;
        let xmlStr = await zip.files[target].async('string');

        for (const rule of rules) {
          const { xml, count } = replaceInXml(xmlStr, rule.find, rule.replace, caseSensitive);
          xmlStr = xml;
          totalCount += count;
        }

        zip.file(target, xmlStr);
      }

      const newBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
      const outName = name.replace(/\.docx$/i, '') + '_取代後.docx';
      results.push({ name: outName, blob: newBlob, count: totalCount });

      setFileStatus(id, 'done', '完成');
      log(`✓ ${name} — 共取代 ${totalCount} 處`, totalCount > 0 ? 'success' : 'info');
      renderDownload(outName, newBlob, totalCount);

    } catch (err) {
      setFileStatus(id, 'error', '錯誤');
      log(`✗ ${name} — ${err.message}`, 'error');
      console.error(err);
    }
  }

  setProgress(100);
  log(`全部完成！共處理 ${fileArr.length} 個檔案`, 'highlight');
  downloadSection.classList.remove('section-hidden');
  runBtn.disabled = false;
});

function renderDownload(name, blob, count) {
  const url = URL.createObjectURL(blob);
  const el = document.createElement('div');
  el.className = 'download-item';
  el.innerHTML = `
    <span style="font-size:16px">📝</span>
    <span class="download-name">${escHtml(name)}</span>
    <span class="download-count">取代 ${count} 處</span>
    <a class="dl-btn" href="${url}" download="${escHtml(name)}">下載</a>
  `;
  downloadList.appendChild(el);
}

dlAllBtn.addEventListener('click', async () => {
  if (results.length === 0) return;
  if (results.length === 1) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(results[0].blob);
    a.download = results[0].name;
    a.click();
    return;
  }
  // Multiple files: zip them
  log('打包所有檔案中...', 'info');
  const zip = new JSZip();
  results.forEach(r => zip.file(r.name, r.blob));
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '取代結果.zip';
  a.click();
  log('✓ 已下載打包檔案', 'success');
});
</script>
</body>
</html>

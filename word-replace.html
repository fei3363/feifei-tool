    <!-- Toast -->
    <div id="toast" class="fixed bottom-24 md:bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-4 py-2 rounded-lg shadow-lg transform transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[60]"><span id="toast-message"></span></div>

    <script>
        // Theme
        function toggleTheme() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
        document.getElementById('theme-toggle-desktop')?.addEventListener('click', toggleTheme);
        document.getElementById('theme-toggle-mobile')?.addEventListener('click', toggleTheme);

        // Toast
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'); toast.classList.remove('opacity-100', 'translate-y-0'); }, duration);
        }

        // ── State ──
        const files = new Map();
        const results = [];
        let fileIdCounter = 0;
        let ruleIdCounter = 1;

        // ── DOM refs ──
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const rulesList = document.getElementById('rulesList');
        const addRuleBtn = document.getElementById('addRuleBtn');
        const runBtn = document.getElementById('runBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const logPanel = document.getElementById('logPanel');
        const downloadSection = document.getElementById('downloadSection');
        const downloadList = document.getElementById('downloadList');
        const dlAllBtn = document.getElementById('dlAllBtn');

        // ── File upload ──
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'dark:border-blue-400', 'bg-blue-50', 'dark:bg-blue-900/10'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-blue-500', 'dark:border-blue-400', 'bg-blue-50', 'dark:bg-blue-900/10'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'dark:border-blue-400', 'bg-blue-50', 'dark:bg-blue-900/10');
            addFiles([...e.dataTransfer.files]);
        });
        fileInput.addEventListener('change', () => {
            addFiles([...fileInput.files]);
            fileInput.value = '';
        });

        function addFiles(newFiles) {
            let added = 0;
            newFiles.filter(f => f.name.toLowerCase().endsWith('.docx')).forEach(f => {
                const id = fileIdCounter++;
                files.set(id, { file: f, name: f.name });
                renderFileItem(id, f);
                added++;
            });
            if (added > 0) showToast(`已加入 ${added} 個檔案`);
            else if (newFiles.length > 0) showToast('僅支援 .docx 格式');
            updateRunBtn();
        }

        function renderFileItem(id, f) {
            const el = document.createElement('div');
            el.className = 'flex items-center gap-3 px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-sm';
            el.id = `file-${id}`;
            el.innerHTML = `
                <span class="text-base flex-shrink-0">📝</span>
                <span class="flex-1 truncate" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
                <span class="text-xs text-gray-500 dark:text-gray-400 font-mono whitespace-nowrap">${formatSize(f.size)}</span>
                <span class="status-badge text-xs px-2 py-0.5 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300" id="status-${id}">待處理</span>
                <button class="file-remove text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 text-lg leading-none px-1 transition-colors" aria-label="移除">×</button>
            `;
            el.querySelector('.file-remove').addEventListener('click', () => removeFile(id));
            fileList.appendChild(el);
        }

        function removeFile(id) {
            files.delete(id);
            document.getElementById(`file-${id}`)?.remove();
            updateRunBtn();
        }

        // ── Rules ──
        addRuleBtn.addEventListener('click', addRule);

        function addRule() {
            const id = ruleIdCounter++;
            const el = document.createElement('div');
            el.className = 'rule-item grid grid-cols-[1fr_auto_1fr_auto] gap-2 md:gap-3 items-end';
            el.dataset.id = id;
            el.innerHTML = `
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">原始文字</label>
                    <input class="rule-find w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400" type="text" placeholder="輸入要尋找的文字…">
                </div>
                <div class="pb-2 text-gray-400 dark:text-gray-500">→</div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">取代為</label>
                    <input class="rule-replace w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400" type="text" placeholder="輸入取代後的文字…">
                </div>
                <button class="rule-remove pb-2 px-2 text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 text-xl leading-none transition-colors" title="移除此規則">×</button>
            `;
            el.querySelector('.rule-remove').addEventListener('click', () => {
                if (rulesList.children.length > 1) el.remove();
            });
            rulesList.appendChild(el);
        }

        // remove first rule handler
        rulesList.querySelector('.rule-remove').addEventListener('click', function() {
            if (rulesList.children.length > 1) this.closest('.rule-item').remove();
        });

        // ── Helpers ──
        function updateRunBtn() { runBtn.disabled = files.size === 0; }
        function formatSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB'; }
        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function log(msg, type = 'info') {
            logPanel.classList.remove('hidden');
            const el = document.createElement('div');
            const colorMap = {
                info: 'text-gray-500 dark:text-gray-400',
                success: 'text-green-600 dark:text-green-400',
                error: 'text-red-600 dark:text-red-400',
                highlight: 'text-blue-600 dark:text-blue-400 font-medium'
            };
            el.className = colorMap[type] || colorMap.info;
            el.textContent = `${new Date().toLocaleTimeString('zh-TW')} › ${msg}`;
            logPanel.appendChild(el);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function setProgress(pct) {
            progressBar.classList.remove('hidden');
            progressFill.style.width = pct + '%';
        }

        function setFileStatus(id, status, text) {
            const el = document.getElementById(`status-${id}`);
            if (!el) return;
            const styles = {
                pending: 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300',
                done: 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400',
                error: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400'
            };
            el.className = `status-badge text-xs px-2 py-0.5 rounded-full ${styles[status] || styles.pending}`;
            el.textContent = text;
        }

        // ── Core: Replace in XML ──
        function getRules() {
            return [...rulesList.querySelectorAll('.rule-item')].map(row => ({
                find: row.querySelector('.rule-find').value,
                replace: row.querySelector('.rule-replace').value
            })).filter(r => r.find.trim() !== '');
        }

        function replaceInXml(xmlStr, find, replace, caseSensitive) {
            let count = 0;
            const flags = caseSensitive ? 'g' : 'gi';
            const escaped = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp(escaped, flags);

            const result = xmlStr.replace(/<w:t([^>]*)>([\s\S]*?)<\/w:t>/g, (match, attrs, text) => {
                const newText = text.replace(re, () => { count++; return replace; });
                if (newText !== text) {
                    if (!attrs.includes('xml:space')) {
                        attrs = ' xml:space="preserve"' + attrs;
                    }
                    return `<w:t${attrs}>${newText}</w:t>`;
                }
                return match;
            });

            return { xml: result, count };
        }

        // ── Main processing ──
        runBtn.addEventListener('click', async () => {
            const rules = getRules();
            if (rules.length === 0) { log('請至少設定一條取代規則', 'error'); showToast('請至少設定一條取代規則'); return; }
            if (files.size === 0) { log('請先上傳 Word 檔案', 'error'); return; }

            const caseSensitive = document.getElementById('optCase').checked;
            const includeHeaders = document.getElementById('optHeaders').checked;
            const includeComments = document.getElementById('optComments').checked;

            runBtn.disabled = true;
            results.length = 0;
            downloadList.innerHTML = '';
            downloadSection.classList.add('hidden');
            logPanel.innerHTML = '';
            setProgress(0);

            const fileArr = [...files.entries()];
            log(`開始處理 ${fileArr.length} 個檔案，${rules.length} 條規則`, 'highlight');

            for (let i = 0; i < fileArr.length; i++) {
                const [id, { file, name }] = fileArr[i];
                setProgress(Math.round((i / fileArr.length) * 90));

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    let totalCount = 0;

                    const targets = ['word/document.xml'];
                    if (includeHeaders) {
                        Object.keys(zip.files).forEach(k => {
                            if (k.startsWith('word/header') || k.startsWith('word/footer')) targets.push(k);
                        });
                    }
                    if (includeComments && zip.files['word/comments.xml']) {
                        targets.push('word/comments.xml');
                    }

                    for (const target of targets) {
                        if (!zip.files[target]) continue;
                        let xmlStr = await zip.files[target].async('string');

                        for (const rule of rules) {
                            const { xml, count } = replaceInXml(xmlStr, rule.find, rule.replace, caseSensitive);
                            xmlStr = xml;
                            totalCount += count;
                        }

                        zip.file(target, xmlStr);
                    }

                    const newBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
                    const outName = name.replace(/\.docx$/i, '') + '_取代後.docx';
                    results.push({ name: outName, blob: newBlob, count: totalCount });

                    setFileStatus(id, 'done', '完成');
                    log(`✓ ${name} — 共取代 ${totalCount} 處`, totalCount > 0 ? 'success' : 'info');
                    renderDownload(outName, newBlob, totalCount);

                } catch (err) {
                    setFileStatus(id, 'error', '錯誤');
                    log(`✗ ${name} — ${err.message}`, 'error');
                    console.error(err);
                }
            }

            setProgress(100);
            log(`全部完成！共處理 ${fileArr.length} 個檔案`, 'highlight');
            downloadSection.classList.remove('hidden');
            runBtn.disabled = false;
            showToast('批次取代完成');
        });

        function renderDownload(name, blob, count) {
            const url = URL.createObjectURL(blob);
            const el = document.createElement('div');
            el.className = 'flex items-center gap-3 px-3 py-2 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg text-sm';
            el.innerHTML = `
                <span class="text-base flex-shrink-0">📝</span>
                <span class="flex-1 truncate" title="${escHtml(name)}">${escHtml(name)}</span>
                <span class="text-xs text-green-700 dark:text-green-400 font-mono whitespace-nowrap">取代 ${count} 處</span>
                <a class="inline-flex items-center gap-1 px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-medium rounded-md transition-colors" href="${url}" download="${escHtml(name)}">下載</a>
            `;
            downloadList.appendChild(el);
        }

        dlAllBtn.addEventListener('click', async () => {
            if (results.length === 0) return;
            if (results.length === 1) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(results[0].blob);
                a.download = results[0].name;
                a.click();
                showToast('已下載');
                return;
            }
            log('打包所有檔案中…', 'info');
            const zip = new JSZip();
            results.forEach(r => zip.file(r.name, r.blob));
            const blob = await zip.generateAsync({ type: 'blob' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '取代結果.zip';
            a.click();
            log('✓ 已下載打包檔案', 'success');
            showToast('已下載打包檔案');
        });
    </script>
</body>
</html>

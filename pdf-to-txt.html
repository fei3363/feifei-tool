    <!-- Toast -->
    <div id="toast" class="fixed bottom-24 md:bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-4 py-2 rounded-lg shadow-lg transform transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[60]"><span id="toast-message"></span></div>

    <script>
        // Theme
        function toggleTheme() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
        document.getElementById('theme-toggle-desktop')?.addEventListener('click', toggleTheme);
        document.getElementById('theme-toggle-mobile')?.addEventListener('click', toggleTheme);

        // Toast
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'); toast.classList.remove('opacity-100', 'translate-y-0'); }, duration);
        }

        // configure pdf.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const dropzone     = document.getElementById('dropzone');
        const fileInput    = document.getElementById('pdfInput');
        const statusWrap   = document.getElementById('statusWrap');
        const statusLbl    = document.getElementById('statusLabel');
        const statusPg     = document.getElementById('statusPage');
        const progressBar  = document.getElementById('progressBar');
        const output       = document.getElementById('output');
        const outTitle     = document.getElementById('outTitle');
        const outMeta      = document.getElementById('outMeta');
        const textbox      = document.getElementById('textbox');
        const errorEl      = document.getElementById('error');
        const copyBtn      = document.getElementById('copyBtn');
        const downloadBtn  = document.getElementById('downloadBtn');
        const resetBtn     = document.getElementById('resetBtn');

        let currentName = 'extracted';

        const showError = msg => {
            errorEl.textContent = '⚠  ' + msg;
            errorEl.classList.remove('hidden');
        };
        const hideError = () => errorEl.classList.add('hidden');

        const setStatus = (label, page, total) => {
            statusWrap.classList.remove('hidden');
            statusLbl.textContent = label;
            if (total) {
                statusPg.textContent = `${page} / ${total}`;
                progressBar.style.width = `${(page / total) * 100}%`;
            } else {
                statusPg.textContent = '';
                progressBar.style.width = '0%';
            }
        };
        const hideStatus = () => {
            statusWrap.classList.add('hidden');
            progressBar.style.width = '0%';
        };

        const showOutput = () => output.classList.remove('hidden');
        const hideOutput = () => output.classList.add('hidden');

        // ----- file handling -----
        fileInput.addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) handleFile(f);
            fileInput.value = '';
        });

        ['dragenter', 'dragover'].forEach(evt =>
            dropzone.addEventListener(evt, e => {
                e.preventDefault();
                dropzone.classList.add('border-blue-500', 'dark:border-blue-400', 'bg-blue-50', 'dark:bg-blue-900/10');
            })
        );
        ['dragleave', 'drop'].forEach(evt =>
            dropzone.addEventListener(evt, e => {
                e.preventDefault();
                dropzone.classList.remove('border-blue-500', 'dark:border-blue-400', 'bg-blue-50', 'dark:bg-blue-900/10');
            })
        );
        dropzone.addEventListener('drop', e => {
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if (f) handleFile(f);
        });

        async function handleFile(file) {
            hideError();
            hideOutput();
            textbox.value = '';

            if (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
                showError('檔案格式不正確：請選擇 PDF 檔案。');
                showToast('請選擇 PDF 檔案');
                return;
            }

            currentName = file.name.replace(/\.pdf$/i, '');
            setStatus('讀取檔案…', 0, 0);

            try {
                const buf = await file.arrayBuffer();
                setStatus('解析 PDF 結構…', 0, 0);

                const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                const total = pdf.numPages;
                const chunks = [];

                for (let i = 1; i <= total; i++) {
                    setStatus('擷取文字中…', i, total);
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();

                    const lines = [];
                    let lastY = null;
                    let lineBuf = [];
                    const flush = () => {
                        if (lineBuf.length) {
                            lines.push(lineBuf.join('').replace(/\s+$/g, ''));
                            lineBuf = [];
                        }
                    };
                    for (const item of content.items) {
                        if (!('str' in item)) continue;
                        const y = item.transform ? item.transform[5] : null;
                        if (lastY !== null && y !== null && Math.abs(y - lastY) > 2) {
                            flush();
                        }
                        lineBuf.push(item.str);
                        if (item.hasEOL) flush();
                        lastY = y;
                    }
                    flush();

                    const pageText = lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
                    chunks.push(`──── Page ${i} ────\n${pageText}`);

                    await new Promise(r => setTimeout(r, 0));
                }

                const fullText = chunks.join('\n\n');
                textbox.value = fullText;

                outTitle.textContent = currentName;
                outMeta.textContent = `${total} pages · ${fullText.length.toLocaleString()} chars`;

                hideStatus();
                showOutput();
                showToast(`擷取完成，共 ${total} 頁`);
            } catch (err) {
                console.error(err);
                hideStatus();
                showError(`解析失敗：${err.message || err}`);
                showToast('解析失敗');
            }
        }

        copyBtn.addEventListener('click', async () => {
            if (!textbox.value) return;
            try {
                await navigator.clipboard.writeText(textbox.value);
                showToast('已複製到剪貼簿');
            } catch {
                textbox.select();
                document.execCommand('copy');
                showToast('已複製到剪貼簿');
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!textbox.value) return;
            const blob = new Blob([textbox.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentName}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            showToast('已下載 .txt');
        });

        resetBtn.addEventListener('click', () => {
            textbox.value = '';
            hideOutput();
            hideError();
            hideStatus();
            fileInput.value = '';
            showToast('已清除');
        });
    </script>
